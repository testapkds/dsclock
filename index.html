<!DOCTYPE html>
<html>
<head>
    <title>Clock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { background: black; color: white; margin: 0; display: table; width: 100%; height: 100vh; overflow: hidden; font-family: Helvetica, sans-serif; }
        #clock { display: table-cell; vertical-align: middle; text-align: center; font-size: 80px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="clock">--:--</div>
    <script type="text/javascript">
        function update() {
            var d = new Date();
            var h = d.getHours();
            var m = d.getMinutes();
            if (h < 10) h = "0" + h;
            if (m < 10) m = "0" + m;
            document.getElementById('clock').innerHTML = h + ":" + m;
            setTimeout(update, 10000);
        }
        update();
    </script>
</body>
</html>
