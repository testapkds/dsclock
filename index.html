<!DOCTYPE html>
<html>
<head>
<title>Clock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
  /* Using table layout for guaranteed centering on ancient Safari */
  .container { display: table; width: 100%; height: 100%; }
  .content { display: table-cell; vertical-align: middle; text-align: center; }
  
  #time { font-size: 110px; color: #F00; font-weight: bold; line-height: 0.9; display: block; }
  #date { font-size: 42px; color: #FF8C00; font-weight: bold; margin-top: 5px; display: block; }
</style>
</head>
<body onload="u()">
  <div class="container">
    <div class="content">
      <div id="time">00:00</div>
      <div id="date">--- -- ---</div>
    </div>
  </div>

<script type="text/javascript">
function u(){
  var d=new Date(), h=d.getHours(), m=d.getMinutes(), n=d.getDate(), 
      mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"], 
      dy=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  if(h<10) h="0"+h; if(m<10) m="0"+m;
  document.getElementById('time').innerHTML = h+":"+m;
  document.getElementById('date').innerHTML = dy[d.getDay()]+" "+n+" "+mo[d.getMonth()];
  setTimeout(u, 10000);
}
</script>
</body>
</html>
