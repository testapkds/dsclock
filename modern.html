<!DOCTYPE html>
<html>
<head>
    <title>Modern Bubbly Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background-color: black;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Fredoka One', cursive;
        }

        #date-top {
            font-family: 'Caveat', cursive;
            color: #fff982;
            font-size: 8vw;
            text-shadow: 2px 2px 0px #5c4d00;
            margin-bottom: -2vw;
        }

        #time {
            font-size: 35vw;
            color: #ff4d6d; /* Bright Pink/Red */
            line-height: 1;
            /* The "Outline" effect */
            text-shadow: 
                -3px -3px 0 #5a2d82,  
                 3px -3px 0 #5a2d82,
                -3px  3px 0 #5a2d82,
                 3px  3px 0 #5a2d82,
                 8px  8px 0px rgba(0,0,0,0.5);
        }

        #date-bottom {
            font-family: 'Caveat', cursive;
            color: #fff982;
            font-size: 15vw;
            margin-top: -4vw;
            text-shadow: 3px 3px 0px #5c4d00;
        }
    </style>
</head>
<body onload="updateClock()">

    <div id="date-top">MAR 3, 2026</div>
    <div id="time">1:34</div>
    <div id="date-bottom">Tuesday</div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Time
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            // Using 12h format as per your screenshot
            h = h % 12 || 12; 
            document.getElementById('time').innerText = h + ":" + m;

            // Date Strings
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            
            document.getElementById('date-top').innerText = 
                months[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear();
            document.getElementById('date-bottom').innerText = days[now.getDay()];

            setTimeout(updateClock, 1000);
        }
    </script>
</body>
</html>
