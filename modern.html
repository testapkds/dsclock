<!DOCTYPE html>
<html>
<head>
    <title>Overlap Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pacifico&family=Varela+Round&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            color: white;
        }

        .clock-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column;
        }

        #time {
            /* Varela Round is very close to Arial Rounded */
            font-family: 'Varela Round', sans-serif; 
            font-size: 35vw; 
            color: #ff4d6d;
            z-index: 1; /* Clock is bottom layer */
            /* Deep Purple Outline */
            text-shadow: 
                -4px -4px 0 #3a1a5e,  4px -4px 0 #3a1a5e,
                -4px  4px 0 #3a1a5e,  4px  4px 0 #3a1a5e,
                8px 8px 10px rgba(0,0,0,0.5);
            line-height: 1;
            margin: 0;
            position: absolute; /* Precise positioning */
        }

        .date-text {
            position: absolute;
            color: #fff982;
            z-index: 2; /* Text is top layer */
            text-shadow: 3px 3px 0px #5c4d00;
            white-space: nowrap;
            text-align: center;
        }

        /* Top: Waltograph approximation */
        #date-top { 
            top: 15%; 
            font-family: 'Pacifico', cursive; 
            font-size: 8vw; 
            transform: rotate(-2deg);
        }
        
        /* Bottom: Segoe approximation */
        #date-bottom { 
            bottom: 15%; 
            font-family: 'Varela Round', sans-serif; 
            font-size: 15vw; 
            font-weight: bold;
            letter-spacing: -2px;
        }
    </style>
</head>
<body onload="u()">
    <div class="clock-container">
        <div id="date-top" class="date-text">MAR 3, 2026</div>
        <div id="time">0:00</div>
        <div id="date-bottom" class="date-text">Tuesday</div>
    </div>

    <script>
        function u() {
            var d=new Date(), h=d.getHours(), m=String(d.getMinutes()).padStart(2,'0'),
                mo=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"],
                dy=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
            
            // 12h format
            document.getElementById('time').innerHTML = (h % 12 || 12) + ":" + m;
            document.getElementById('date-top').innerHTML = mo[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
            document.getElementById('date-bottom').innerHTML = dy[d.getDay()];
            setTimeout(u, 1000);
        }
    </script>
</body>
</html>
