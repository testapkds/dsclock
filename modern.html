<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Nunito:wght@800&display=swap" rel="stylesheet">

<style>
:root{
    --red:#ff4a6e;
    --yellow:#f4c267;
    --outline:#000;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-smooth:always;
    -webkit-font-smoothing:antialiased;
}

.container{
    position:relative;
    width:100vw;
    height:100vh;
}

/* DATE (top floating) */
.date{
    position:absolute;
    top:4vh;
    left:50%;
    transform:translateX(-50%);
    font-family:'Segoe UI','Inter',sans-serif;
    font-weight:700;
    font-size:5vh;
    color:var(--yellow);
    -webkit-text-stroke:0.35vh var(--outline);
}

/* TIME (dominant center) */
.time{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:'Arial Rounded MT Bold','Nunito',sans-serif;
    font-weight:800;
    font-size:28vw; /* fills landscape width */
    line-height:1;
    color:var(--red);
    -webkit-text-stroke:1.1vw var(--outline);
}

/* DAY (bottom floating) */
.day{
    position:absolute;
    bottom:8vh;
    left:50%;
    transform:translateX(-50%);
    font-family:'Segoe UI','Inter',sans-serif;
    font-weight:700;
    font-size:7vh;
    color:var(--yellow);
    -webkit-text-stroke:0.4vh var(--outline);
}

/* Portrait tuning */
@media (orientation: portrait){
    .time{
        font-size:32vw;
        -webkit-text-stroke:1.6vw var(--outline);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
    <div class="day" id="day"></div>
</div>

<script>
function updateClock(){
    const now = new Date();

    const dateOptions = { month: 'short', day: 'numeric', year: 'numeric' };
    const dayOptions = { weekday: 'long' };

    document.getElementById("date").textContent =
        now.toLocaleDateString('en-US', dateOptions);

    document.getElementById("day").textContent =
        now.toLocaleDateString('en-US', dayOptions);

    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');

    document.getElementById("time").textContent = `${h}:${m}`;
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
