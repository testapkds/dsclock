<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>

<!-- Web Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Quicksand:wght@700&display=swap" rel="stylesheet">

<style>
:root{
    --red:#ff4a6e;
    --yellow:#ffcc66;
    --outline:#000;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    height:100vh;
    width:100vw;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.wrapper{
    width:95vmin;
    height:95vmin;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.date{
    font-family:'Nunito', 'Segoe UI', sans-serif;
    font-weight:900;
    font-size:10vmin;
    color:var(--yellow);
    -webkit-text-stroke:0.6vmin var(--outline);
    margin-bottom:2vmin;
}

.time{
    font-family:'Arial Rounded MT Bold', 'Quicksand', sans-serif;
    font-weight:700;
    font-size:38vmin;
    line-height:1;
    color:var(--red);
    -webkit-text-stroke:1.2vmin var(--outline);
}

.day{
    font-family:'Nunito', 'Segoe UI', sans-serif;
    font-weight:900;
    font-size:12vmin;
    color:var(--yellow);
    -webkit-text-stroke:0.6vmin var(--outline);
    margin-top:2vmin;
}

/* LANDSCAPE MAXIMIZE */
@media (orientation: landscape){
    .wrapper{
        width:100vw;
        height:100vh;
    }
    .time{
        font-size:30vh;
    }
    .date{
        font-size:7vh;
    }
    .day{
        font-size:9vh;
    }
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
    <div class="day" id="day"></div>
</div>

<script>
function updateClock(){
    const now = new Date();

    const optionsDate = { month: 'short', day: 'numeric', year: 'numeric' };
    const optionsDay = { weekday: 'long' };

    let dateStr = now.toLocaleDateString('en-US', optionsDate).toUpperCase();
    dateStr = dateStr.replace(',', ','); // keep format like MAR 3, 2026

    document.getElementById("date").textContent = dateStr;
    document.getElementById("day").textContent = now.toLocaleDateString('en-US', optionsDay);

    let hours = now.getHours().toString().padStart(2,'0');
    let minutes = now.getMinutes().toString().padStart(2,'0');

    document.getElementById("time").textContent = `${hours}:${minutes}`;
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
