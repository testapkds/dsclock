<!DOCTYPE html>
<html>
<head>
    <title>Overlap Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Pacifico&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            color: white;
            font-family: sans-serif;
        }

        /* Container ensures everything stays centered and aligned */
        .clock-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column;
        }

        #time {
            /* Arial Rounded fallback if custom font fails */
            font-family: "Arial Rounded MT Bold", "Varela Round", sans-serif; 
            font-size: 40vw; /* Scales with screen width */
            color: #ff4d6d;
            z-index: 1; /* Clock is bottom layer */
            /* Dark Purple Outline */
            text-shadow: 
                -4px -4px 0 #3a1a5e,  4px -4px 0 #3a1a5e,
                -4px  4px 0 #3a1a5e,  4px  4px 0 #3a1a5e,
                10px 10px 15px rgba(0,0,0,0.5);
            line-height: 1;
            margin: 0;
            position: absolute; /* Allows overlaps */
        }

        .date-text {
            position: absolute;
            color: #fff982;
            z-index: 2; /* Date is top layer */
            text-shadow: 3px 3px 0px #5c4d00;
            white-space: nowrap;
            text-align: center;
        }

        /* Precise Positioning for Overlaps */
        #date-top { 
            top: 25%; 
            font-family: "Pacifico", cursive; /* Handwritten fallback */
            font-size: 8vw; 
            transform: rotate(-2deg);
        }
        
        #date-bottom { 
            bottom: 25%; 
            font-family: sans-serif; /* Bold Sans fallback */
            font-size: 15vw; 
            font-weight: bold;
            letter-spacing: -2px;
        }
    </style>
</head>
<body onload="u()">
    <div class="clock-container">
        <div id="date-top" class="date-text">MAR 3, 2026</div>
        <div id="time">0:00</div>
        <div id="date-bottom" class="date-text">Tuesday</div>
    </div>

    <script>
        function u() {
            var d=new Date(), h=d.getHours(), m=String(d.getMinutes()).padStart(2,'0'),
                mo=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"],
                dy=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
            
            // Time formatting
            document.getElementById('time').innerHTML = (h % 12 || 12) + ":" + m;
            // Date formatting
            document.getElementById('date-top').innerHTML = mo[d.getMonth()] + " " + d.getDate();
            // Day formatting
            document.getElementById('date-bottom').innerHTML = dy[d.getDay()];
            setTimeout(u, 1000);
        }
    </script>
</body>
</html>
