<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Nunito:wght@800&display=swap" rel="stylesheet">

<style>
:root{
    --red:#ff4768;
    --yellow:#f1c06a;
    --outline:#000;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    width:100vw;
    height:100vh;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
}

/* DATE (small, high) */
.date{
    position:absolute;
    top:6vh;
    width:100%;
    text-align:center;
    font-family:'Segoe UI','Inter',sans-serif;
    font-weight:600;
    font-size:4.2vh;
    color:var(--yellow);
    -webkit-text-stroke:0.25vh var(--outline);
}

/* TIME (dominant, nearly edge-to-edge) */
.time{
    position:absolute;
    top:46%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:'Arial Rounded MT Bold','Nunito',sans-serif;
    font-weight:800;
    font-size:82vw;       /* Edge dominance */
    line-height:0.85;
    color:var(--red);
    -webkit-text-stroke:1.6vw var(--outline);
    letter-spacing:-0.02em;
}

/* DAY (medium, below time) */
.day{
    position:absolute;
    bottom:14vh;
    width:100%;
    text-align:center;
    font-family:'Segoe UI','Inter',sans-serif;
    font-weight:600;
    font-size:7vh;
    color:var(--yellow);
    -webkit-text-stroke:0.35vh var(--outline);
}

/* Portrait adjustments */
@media (orientation:portrait){
    .time{
        font-size:92vw;
        -webkit-text-stroke:2vw var(--outline);
    }
}
</style>
</head>

<body>

<div class="date" id="date"></div>
<div class="time" id="time"></div>
<div class="day" id="day"></div>

<script>
function updateClock(){
    const now = new Date();

    const dateOptions = { month:'short', day:'numeric', year:'numeric' };
    const dayOptions = { weekday:'long' };

    document.getElementById("date").textContent =
        now.toLocaleDateString('en-US', dateOptions);

    document.getElementById("day").textContent =
        now.toLocaleDateString('en-US', dayOptions);

    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');

    document.getElementById("time").textContent = `${h}:${m}`;
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
