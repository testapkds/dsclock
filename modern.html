<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Nunito:wght@800&display=swap" rel="stylesheet">

<style>
:root{
:root{
    --red:#ff4768;
    --yellow:#f1c06a;
    --outline:#000;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    -webkit-font-smoothing:antialiased;
}

/* DATE */
.date{
    font-family:'Segoe UI','Inter',sans-serif;
    font-weight:600;
    font-size:4vw;
    color:var(--yellow);
    -webkit-text-stroke:0.25vw var(--outline);
    margin-bottom:-3vw;          /* overlap into time */
    z-index:2;
}

/* TIME */
.time{
    font-family:'Arial Rounded MT Bold','Trebuchet MS','Arial',sans-serif;
    font-weight:900;
    font-size:22vw;              /* responsive but controlled */
    line-height:0.85;
    color:var(--red);
    -webkit-text-stroke:0.9vw var(--outline);
    letter-spacing:-0.03em;
    z-index:1;
}

/* DAY */
.day{
    font-family:'Segoe UI','Inter',sans-serif;
    font-weight:600;
    font-size:5.5vw;
    color:var(--yellow);
    -webkit-text-stroke:0.3vw var(--outline);
    margin-top:-4vw;             /* overlap bottom of time */
    z-index:2;
}
</style>
</head>

<body>

<div class="date" id="date"></div>
<div class="time" id="time"></div>
<div class="day" id="day"></div>

<script>
function updateClock(){
    const now = new Date();

    const dateOptions = { month:'short', day:'numeric', year:'numeric' };
    const dayOptions = { weekday:'long' };

    document.getElementById("date").textContent =
        now.toLocaleDateString('en-US', dateOptions);

    document.getElementById("day").textContent =
        now.toLocaleDateString('en-US', dayOptions);

    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');

    document.getElementById("time").textContent = `${h}:${m}`;
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
