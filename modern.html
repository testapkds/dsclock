<!DOCTYPE html>
<html>
<head>
    <title>Overlap Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Varela+Round&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            background: #000; 
            margin: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column;
        }

        #time {
            /* Varela Round for rounded look */
            font-family: 'Varela Round', sans-serif; 
            /* Base size for portrait */
            font-size: 40vw;
            color: #ff4d6d;
            z-index: 1; /* Bottom Layer */
            /* Flat Black Outline */
            text-shadow: 
                -3px -3px 0 #000, 3px -3px 0 #000, 
                -3px  3px 0 #000, 3px  3px 0 #000;
            line-height: 1;
            margin: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .date-text {
            position: absolute;
            color: #fff982;
            z-index: 2; /* Top Layer */
            /* Flat Black Outline */
            text-shadow: 
                -2px -2px 0 #000, 2px -2px 0 #000, 
                -2px  2px 0 #000, 2px  2px 0 #000;
            white-space: nowrap;
            text-align: center;
            font-family: 'Pacifico', cursive; /* Handwritten for both */
        }

        /* Portrait Sizes */
        #date-top { 
            top: 15vh; 
            font-size: 8vh; 
        }
        
        #date-bottom { 
            bottom: 15vh; 
            font-size: 12vh; 
            letter-spacing: -2px;
        }

        /* Landscape adjustments for better overlap */
        @media (orientation: landscape) {
            #time { font-size: 55vh; } /* Scale by height for width */
            #date-top { top: 5vh; font-size: 12vh; } 
            #date-bottom { bottom: 5vh; font-size: 18vh; }
        }
    </style>
</head>
<body onload="u()">
    <div class="clock-container">
        <div id="date-top" class="date-text">MAR 3, 2026</div>
        <div id="time">0:00</div>
        <div id="date-bottom" class="date-text">Tuesday</div>
    </div>

    <script>
        function u() {
            var d=new Date(), h=d.getHours(), m=String(d.getMinutes()).padStart(2,'0'),
                mo=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"],
                dy=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
            
            // 12h format
            document.getElementById('time').innerHTML = (h % 12 || 12) + ":" + m;
            document.getElementById('date-top').innerHTML = mo[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
            document.getElementById('date-bottom').innerHTML = dy[d.getDay()];
            setTimeout(u, 1000);
        }
    </script>
</body>
</html>
